<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Fingent — Agentic platform for financial services</title>
<style>
  :root{
    --bg:#f4f6fb; --surface:#ffffff; --surface2:#f8fafc;
    --ink:#0e1b2e; --ink2:#1f2d44; --mut:#64748b; --mut2:#94a3b8;
    --line:#e6ebf3; --line2:#eef2f8;
    --navy:#0b2545; --navy2:#13386b;
    --acc:#0a8f5b; --acc-ink:#067a4d; --acc-soft:#e7f6ef;
    --blue:#2563eb; --blue-soft:#e8f0fe;
    --warn:#b7791f; --warn-soft:#fdf4e3; --bad:#c0392b; --bad-soft:#fdecea;
    --ok:#0a8f5b; --ok-soft:#e7f6ef; --purple:#6d28d9; --purple-soft:#f1ebfe;
    --shadow:0 1px 2px rgba(16,27,46,.04),0 8px 24px rgba(16,27,46,.06);
    --shadow-sm:0 1px 2px rgba(16,27,46,.05);
    --r:14px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#d7deea;border-radius:8px;border:2px solid var(--bg)}

  /* ---------- shell ---------- */
  .app{display:grid;grid-template-columns:64px 1fr;min-height:100vh}
  .side{background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;
        align-items:center;gap:4px;padding:14px 0;position:sticky;top:0;height:100vh}
  .side .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#0b2545,#13386b);
        color:#fff;display:grid;place-items:center;font-weight:800;font-size:16px;margin-bottom:10px;box-shadow:var(--shadow-sm)}
  .navbtn{width:42px;height:42px;border-radius:11px;border:none;background:transparent;color:var(--mut);
        display:grid;place-items:center;cursor:pointer;position:relative;transition:.15s}
  .navbtn:hover{background:var(--surface2);color:var(--ink)}
  .navbtn.active{background:var(--acc-soft);color:var(--acc-ink)}
  .navbtn svg{width:20px;height:20px}
  .navbtn .tip{position:absolute;left:52px;top:50%;transform:translateY(-50%);background:var(--navy);color:#fff;
        font-size:12px;padding:5px 9px;border-radius:7px;white-space:nowrap;opacity:0;pointer-events:none;
        transition:.12s;z-index:50;box-shadow:var(--shadow)}
  .navbtn:hover .tip{opacity:1}
  .side .spacer{flex:1}

  .main{min-width:0;display:flex;flex-direction:column}
  .topbar{height:60px;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;
        gap:14px;padding:0 22px;position:sticky;top:0;z-index:20}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px;letter-spacing:.2px}
  .brand .b-sub{color:var(--mut);font-weight:500;font-size:12.5px}
  .topbar .right{margin-left:auto;display:flex;align-items:center;gap:12px}
  .tenant{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--line);
        border-radius:9px;padding:5px 8px 5px 11px}
  .tenant label{font-size:11.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}
  .tenant select{border:none;background:transparent;color:var(--ink);font:inherit;font-weight:600;font-size:13px;cursor:pointer;outline:none}
  .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#0a8f5b,#13386b);color:#fff;
        display:grid;place-items:center;font-weight:700;font-size:13px}
  .content{padding:26px 30px 60px;max-width:1320px;width:100%;margin:0 auto}

  /* ---------- generic ---------- */
  h1{font-size:22px;margin:0 0 2px;letter-spacing:-.2px}
  h2{font-size:18px;margin:0 0 2px;letter-spacing:-.2px}
  h3{font-size:15px;margin:0}
  .page-head{display:flex;align-items:flex-start;gap:16px;margin-bottom:20px}
  .page-head .sub{color:var(--mut);font-size:13.5px;margin-top:2px}
  .page-head .actions{margin-left:auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .muted{color:var(--mut)} .small{font-size:12.5px} .xs{font-size:11.5px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm)}
  .card.pad{padding:18px}
  .grid{display:grid;gap:16px}
  .sep{height:1px;background:var(--line);margin:14px 0}

  .btn{border:1px solid var(--line);background:var(--surface);color:var(--ink);padding:9px 14px;border-radius:10px;
       cursor:pointer;font:inherit;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:7px;transition:.14s}
  .btn:hover{background:var(--surface2);border-color:#d7deea}
  .btn.primary{background:var(--acc);border-color:var(--acc);color:#fff}
  .btn.primary:hover{background:var(--acc-ink)}
  .btn.navy{background:var(--navy);border-color:var(--navy);color:#fff}
  .btn.navy:hover{background:var(--navy2)}
  .btn.sm{padding:6px 11px;font-size:12.5px}
  .btn.ghost{background:transparent}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .iconbtn{width:36px;height:36px;border-radius:9px;border:1px solid var(--line);background:var(--surface);
       display:grid;place-items:center;cursor:pointer;color:var(--mut)}
  .iconbtn:hover{background:var(--surface2);color:var(--ink)}
  .iconbtn svg{width:17px;height:17px}

  input,select,textarea{width:100%;background:var(--surface);color:var(--ink);border:1px solid var(--line);
       border-radius:10px;padding:10px 12px;font:inherit;outline:none;transition:.14s}
  input:focus,select:focus,textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-soft)}
  textarea{resize:vertical}
  label.fld{display:block;margin:14px 0 6px;font-size:12.5px;color:var(--ink2);font-weight:600}
  .search{position:relative}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--mut2)}
  .search input{padding-left:34px}
  select.filter{width:auto;min-width:150px;font-weight:600}

  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;
       background:var(--surface2);color:var(--mut);border:1px solid var(--line)}
  .pill.t1{background:var(--blue-soft);color:#1d4ed8;border-color:#d3e0fd}
  .pill.t2{background:var(--purple-soft);color:#6d28d9;border-color:#e6dcfb}
  .pill.ok{background:var(--ok-soft);color:var(--acc-ink);border-color:#cdeede}
  .pill.warn{background:var(--warn-soft);color:#9a6610;border-color:#f5e4c2}
  .pill.bad{background:var(--bad-soft);color:#a8321f;border-color:#f6d4cd}
  .pill.flat{background:#fff}
  .tool-chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:4px 9px;border-radius:8px;
       background:var(--surface2);border:1px solid var(--line);color:var(--ink2);margin:3px 5px 0 0}
  .tool-chip.web{border-color:#cdeede;background:var(--ok-soft);color:var(--acc-ink)}
  .tool-chip.mcp{border-color:#e6dcfb;background:var(--purple-soft);color:#6d28d9}
  .tool-chip.side::after{content:"⚠";margin-left:1px}

  /* ---------- metric cards ---------- */
  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .metric{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px 18px 16px;
       box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
  .metric .ic{position:absolute;right:16px;top:16px;width:36px;height:36px;border-radius:10px;display:grid;place-items:center}
  .metric .lab{font-size:12.5px;color:var(--mut);font-weight:600}
  .metric .val{font-size:28px;font-weight:800;letter-spacing:-.5px;margin-top:6px}
  .metric .delta{font-size:12px;color:var(--mut);margin-top:3px}
  .metric .val.green{color:var(--acc-ink)} .metric .val.warn{color:#9a6610} .metric .val.navy{color:var(--navy)}

  /* ---------- tables ---------- */
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{text-align:left;padding:11px 14px;color:var(--mut);font-weight:600;font-size:12px;
       text-transform:uppercase;letter-spacing:.4px;background:var(--surface2);border-bottom:1px solid var(--line)}
  tbody td{padding:13px 14px;border-bottom:1px solid var(--line2)}
  tbody tr:last-child td{border-bottom:none}
  tbody tr.clk{cursor:pointer} tbody tr.clk:hover{background:var(--surface2)}
  .t-name{display:flex;align-items:center;gap:10px;font-weight:600}
  .li-ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-weight:700;font-size:13px;color:#fff;flex:none}

  /* ---------- template gallery ---------- */
  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
  .tcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;cursor:pointer;
       transition:.15s;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;gap:8px}
  .tcard:hover{border-color:#cdd7e6;box-shadow:var(--shadow);transform:translateY(-1px)}
  .tcard .top{display:flex;align-items:center;gap:11px}
  .tcard h3{font-size:14.5px}
  .tcard .desc{color:var(--mut);font-size:12.5px;line-height:1.5;min-height:38px}
  .cat-head{display:flex;align-items:center;gap:10px;margin:24px 0 12px}
  .cat-head h2{font-size:15px;color:var(--ink2)}
  .cat-head .ln{flex:1;height:1px;background:var(--line)}

  /* ---------- drawer ---------- */
  .scrim{position:fixed;inset:0;background:rgba(14,27,46,.38);backdrop-filter:blur(2px);z-index:60;opacity:0;
       pointer-events:none;transition:.18s}
  .scrim.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:min(640px,94vw);background:var(--surface);z-index:61;
       box-shadow:-12px 0 40px rgba(16,27,46,.18);transform:translateX(100%);transition:.22s cubic-bezier(.4,0,.2,1);
       display:flex;flex-direction:column}
  .drawer.show{transform:translateX(0)}
  .drawer .dh{display:flex;align-items:center;gap:12px;padding:18px 22px;border-bottom:1px solid var(--line)}
  .drawer .db{padding:20px 22px;overflow:auto;flex:1}
  .drawer .df{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;background:var(--surface2)}

  .kv{display:grid;grid-template-columns:150px 1fr;gap:8px 14px;font-size:13px}
  .kv b{color:var(--mut);font-weight:600}
  .note{border-radius:11px;padding:13px 15px;font-size:13px;line-height:1.5}
  .note.ok{background:var(--ok-soft);border:1px solid #cdeede}
  .note.warn{background:var(--warn-soft);border:1px solid #f5e4c2}
  .note.bad{background:var(--bad-soft);border:1px solid #f6d4cd}
  .note.info{background:var(--blue-soft);border:1px solid #d3e0fd}
  pre{background:#0e1b2e;color:#e7edf6;border-radius:10px;padding:13px;overflow:auto;font-size:12px;
       font-family:ui-monospace,SFMono-Regular,Menlo,monospace;max-height:340px;line-height:1.5}
  details>summary{cursor:pointer;color:var(--mut);font-size:12.5px;font-weight:600;list-style:none}
  details>summary::-webkit-details-marker{display:none}
  details>summary::before{content:"▸ ";color:var(--mut2)}
  details[open]>summary::before{content:"▾ "}

  .empty{text-align:center;padding:48px 20px;color:var(--mut)}
  .empty .big{font-size:15px;font-weight:600;color:var(--ink2);margin-bottom:4px}

  /* span tree */
  .span{border-left:2px solid var(--line);margin:4px 0 4px 6px;padding:5px 0 5px 12px}
  .badge{font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:6px;margin-right:6px}
  .badge.tool{background:var(--ok-soft);color:var(--acc-ink)}
  .badge.agent{background:var(--blue-soft);color:#1d4ed8}
  .badge.hitl{background:var(--warn-soft);color:#9a6610}
  .badge.planner{background:var(--purple-soft);color:#6d28d9}
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:18px}
  .tabs button{border:none;background:transparent;padding:10px 14px;cursor:pointer;color:var(--mut);font:inherit;
       font-weight:600;font-size:13.5px;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tabs button.active{color:var(--acc-ink);border-bottom-color:var(--acc)}

  /* hero */
  .hero{background:linear-gradient(180deg,#eef3fb 0%,#f4f6fb 60%);border:1px solid var(--line);border-radius:18px;
       padding:36px 30px 30px;text-align:center;position:relative;overflow:hidden}
  .hero .orb{width:64px;height:64px;border-radius:50%;margin:0 auto 14px;
       background:conic-gradient(from 90deg,#0a8f5b,#2563eb,#6d28d9,#0a8f5b);filter:blur(.3px);box-shadow:0 6px 24px rgba(37,99,235,.25)}
  .hero h1{font-size:26px;background:linear-gradient(90deg,#0b2545,#0a8f5b);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero .tag{color:var(--mut);margin:6px 0 18px}
  .prompt{position:relative;max-width:760px;margin:0 auto}
  .prompt textarea{min-height:104px;padding:16px;border-radius:14px;box-shadow:var(--shadow-sm);font-size:14.5px}
  .prompt .go{position:absolute;right:12px;bottom:12px;width:40px;height:40px;border-radius:50%;background:var(--navy);
       color:#fff;border:none;cursor:pointer;display:grid;place-items:center}
  .prompt .go:hover{background:var(--navy2)}
  .chips{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;margin-top:16px}
  .chip{background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:8px 15px;cursor:pointer;
       font-size:13px;font-weight:500;transition:.14s;box-shadow:var(--shadow-sm)}
  .chip:hover{border-color:var(--acc);color:var(--acc-ink)}

  .carousel{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  @media(max-width:1100px){.metrics{grid-template-columns:repeat(2,1fr)}.carousel{grid-template-columns:repeat(2,1fr)}}
  svg .grid-l{stroke:var(--line);stroke-width:1}
</style>
</head>
<body>
<div class="app">
  <aside class="side" id="side"></aside>
  <div class="main">
    <header class="topbar">
      <div class="brand"><span style="width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#0b2545,#13386b);color:#fff;display:grid;place-items:center;font-weight:800">F</span>
        Fingent <span class="b-sub">· agentic platform for financial services</span></div>
      <div class="right">
        <div class="tenant"><label>Tenant</label>
          <select id="tenant"><option>acme</option><option>globex</option><option>initech</option></select></div>
        <div class="avatar" id="avatar">A</div>
      </div>
    </header>
    <main class="content" id="main"></main>
  </div>
</div>
<div class="scrim" id="scrim"></div>
<div class="drawer" id="drawer"></div>

<script>
/* ============================ helpers ============================ */
const tenant=()=>document.getElementById('tenant').value;
const authToken=()=>{try{return sessionStorage.getItem('fin_token')||'';}catch(_){return '';}};
const api=(p,o={})=>fetch('/api'+p,{...o,headers:{'Content-Type':'application/json','X-Tenant':tenant(),...(authToken()?{'Authorization':'Bearer '+authToken()}:{}),...(o.headers||{})}})
  .then(async r=>{let d=null;try{d=await r.json();}catch(_){}if(!r.ok){if(r.status===401&&authToken()){try{sessionStorage.removeItem('fin_token');}catch(_){}showLogin();}throw new Error((d&&(d.detail||d.message))||('HTTP '+r.status));}return d;});
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const el=h=>{const d=document.createElement('div');d.innerHTML=h.trim();return d.firstElementChild;};
const fmt=n=>{n=Number(n)||0;return n>=1000?(n/1000).toFixed(n%1000?1:0)+'k':(Number.isInteger(n)?n:n.toFixed(2));};
const money=n=>'$'+(Number(n)||0).toFixed(2);
const slug=s=>(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'').slice(0,28)||'agent';
const colorFor=s=>{const c=['#0a8f5b','#2563eb','#6d28d9','#b7791f','#0891b2','#be123c','#475569'];let h=0;for(const ch of (s||'x'))h=(h*31+ch.charCodeAt(0))>>>0;return c[h%c.length];};
const initials=s=>(s||'?').split(/[_\s-]/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
const toolClass=t=>t.includes('.')?'mcp':(t==='web_search'?'web':'native');

/* ============================ icons ============================ */
const I={
 home:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3l9 7v11h-6v-6H9v6H3V10z"/></svg>',
 dash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="5" rx="1.5"/><rect x="13" y="10" width="8" height="11" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/></svg>',
 catalog:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>',
 agents:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="8" width="16" height="11" rx="3"/><path d="M12 8V4M9 13h.01M15 13h.01M2 12v3M22 12v3"/></svg>',
 tools:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14.7 6.3a4 4 0 00-5.4 5.4L4 17l3 3 5.3-5.3a4 4 0 005.4-5.4l-2.3 2.3-2.3-.6-.6-2.3z"/></svg>',
 mcp:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3v6M12 15v6M3 12h6M15 12h6"/><circle cx="12" cy="12" r="3"/></svg>',
 shield:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6z"/><path d="M9 12l2 2 4-4"/></svg>',
 trace:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12h4l2 6 4-14 2 8h6"/></svg>',
 audit:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M7 3h10l3 3v15H4V3z"/><path d="M8 9h8M8 13h8M8 17h5"/></svg>',
 search:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>',
 refresh:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12a9 9 0 10-3 6.7M21 5v5h-5"/></svg>',
 plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>',
 arrow:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>',
 up:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M6 11l6-6 6 6"/></svg>',
 credit:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="6" width="20" height="13" rx="2"/><path d="M2 10h20"/></svg>',
 bolt:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M13 2L4 14h7l-1 8 9-12h-7z"/></svg>',
 spark:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3v6M12 15v6M5 8l3 2M16 14l3 2M19 8l-3 2M8 14l-3 2"/></svg>',
 play:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>',
 flask:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 3h6M10 3v6l-5 9a2 2 0 002 3h10a2 2 0 002-3l-5-9V3"/><path d="M7 15h10"/></svg>',
 list:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>',

/* ============================ charts ============================ */
function lineChart(data,key){
  const w=560,h=210,pad=28;
  if(!data.length) return `<div class="empty small">No usage data yet for this period.</div>`;
  const xs=data.map((_,i)=>i), ys=data.map(d=>d[key]||0);
  const maxY=Math.max(...ys,0.0001), n=data.length;
  const X=i=>pad+(n===1?(w-2*pad)/2:i*(w-2*pad)/(n-1));
  const Y=v=>h-pad-(v/maxY)*(h-2*pad);
  let path=ys.map((v,i)=>`${i?'L':'M'}${X(i).toFixed(1)} ${Y(v).toFixed(1)}`).join(' ');
  let area=`${path} L${X(n-1)} ${h-pad} L${X(0)} ${h-pad} Z`;
  const grid=[0,.25,.5,.75,1].map(g=>`<line class="grid-l" x1="${pad}" y1="${pad+g*(h-2*pad)}" x2="${w-pad}" y2="${pad+g*(h-2*pad)}"/>`).join('');
  const dots=ys.map((v,i)=>`<circle cx="${X(i)}" cy="${Y(v)}" r="3" fill="#0a8f5b"/>`).join('');
  const labs=data.map((d,i)=>i%Math.ceil(n/6||1)===0?`<text x="${X(i)}" y="${h-8}" font-size="10" fill="#94a3b8" text-anchor="middle">${esc((d.date||'').slice(5))}</text>`:'').join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" preserveAspectRatio="xMidYMid meet">
    ${grid}<path d="${area}" fill="rgba(10,143,91,.10)"/><path d="${path}" fill="none" stroke="#0a8f5b" stroke-width="2.2"/>${dots}${labs}</svg>`;
}
function barList(items,labelKey,valKey){
  if(!items.length) return `<div class="empty small">No agent activity yet.</div>`;
  const max=Math.max(...items.map(i=>i[valKey]||0),1);
  return `<div style="display:flex;flex-direction:column;gap:11px;padding:4px 2px">`+items.map(it=>`
    <div>
      <div class="row" style="justify-content:space-between;margin-bottom:5px">
        <span class="small" style="font-weight:600">${esc(it[labelKey])}</span>
        <span class="small muted">${fmt(it[valKey])}</span></div>
      <div style="height:8px;background:var(--surface2);border-radius:6px;overflow:hidden">
        <div style="height:100%;width:${Math.max(4,(it[valKey]/max)*100)}%;background:linear-gradient(90deg,#0a8f5b,#13386b);border-radius:6px"></div>
      </div></div>`).join('')+`</div>`;
}

function guardChips(g){

  if(g.injection_check!==false) c.push('<span class="tool-chip">injection scan</span>');

  c.push(`<span class="tool-chip">max ${g.max_steps||12} steps</span>`);

function collectAnswers(){
  const a={name:document.getElementById('f_name').value||'my_agent'};
  document.querySelectorAll('.pfield').forEach(f=>{
    if(f.dataset.ptype==='multi_select') a[f.dataset.pname]=[...f.selectedOptions].map(o=>o.value);
    else if(f.dataset.ptype==='number') a[f.dataset.pname]=parseFloat(f.value);
    else if(f.dataset.ptype==='boolean') a[f.dataset.pname]=f.value==='true';
    else a[f.dataset.pname]=f.value;
  });
  return a;
}
async function submitTemplate(name,out,auto){
  out.innerHTML='<div class="note info">Compiling with the LLM, then disposing through the validator…</div>';
  const body={template:name,answers:collectAnswers(),additional_requirements:document.getElementById('f_free').value,
    approve_side_effecting:document.getElementById('f_side').checked,auto_provision:auto};
  try{
    const r=await api('/agents',{method:'POST',body:JSON.stringify(body)});
    out.innerHTML=resultHtml(r,name);
    wireResult(out,r,name);
    if(r&&r.ok) render();   // refresh the lists behind the drawer
  }catch(e){out.innerHTML=`<div class="note bad">${esc(e.message||e)}</div>`;}

/* ---- compile result ---- */
function resultHtml(r,template){
  if(r.stage==='input_validation') return `<div class="note bad"><b>Rejected before the LLM ran.</b><br>${(r.errors||[]).map(esc).join('<br>')}</div>`;
  if(r.needs_prerequisites){
    return `<div class="note warn"><b>Prerequisite agents required first.</b>
      <div class="kv" style="margin-top:8px">${r.missing_hard.map(d=>`<b>${esc(d.agent)}</b><span>${esc(d.reason)} (hard)</span>`).join('')}</div>

  if(!r.ok) return `<div class="note bad"><b>Compile failed.</b> ${esc(r.message||'')}</div>`;
  const s=r.spec, strips=((r.compiler_log||{}).verdicts||[]).flatMap(v=>v.stripped||[]);
  const inj=((r.compiler_log||{}).freetext_injection_signatures)||[];
  return `<div class="note ok"><b>Agent compiled &amp; validated.</b> ${r.used_llm?'(Groq / Llama)':'(deterministic compiler)'}
    ${r.provisioned&&r.provisioned.length?`<br>Auto-provisioned: ${r.provisioned.map(esc).join(', ')}`:''}
    ${r.crystallized_template?`<br>Saved as reusable template <b>${esc(r.crystallized_template)}</b>`:''}</div>
    <div class="card pad" style="margin-top:12px"><div class="kv">
      <b>Name</b><span>${esc(s.name)}</span>
      <b>Template</b><span>${esc(s.template||'(from scratch)')}</span>
      <b>Tools granted</b><span>${(s.tools||[]).map(x=>`<span class="tool-chip ${toolClass(x)} ${'' }">${esc(x)}</span>`).join('')||'<i class="muted">none</i>'}</span>
      <b>Memory</b><span class="small muted">reads ${(s.reads||[]).join(', ')||'—'} · writes ${(s.writes||[]).join(', ')||'—'}</span>
      <b>Human review</b><span>${s.requires_human_review?'<span class="pill warn">required</span>':'no'}</span>
      <b>Injection check</b><span>${s.guardrails.injection_check?'<span class="pill ok">ON</span>':'off'}</span>
      <b>Output review</b><span>${s.guardrails.output_review_required?'<span class="pill warn">required</span>':'no'}</span>
    </div>
    ${strips.length?`<div class="note warn" style="margin-top:12px"><b>Validator disposed (stripped / neutralized):</b><br>${strips.map(x=>'• '+esc(x)).join('<br>')}</div>`:''}
    ${inj.length?`<div class="note bad" style="margin-top:10px"><b>Injection attempt detected in free-text &amp; logged:</b><br>${inj.map(esc).join('<br>')}</div>`:''}
    <details style="margin-top:12px"><summary>Role prompt</summary><pre>${esc(s.role_prompt)}</pre></details>
    <div class="row" style="margin-top:14px"><button class="btn navy" data-act="run">${I.play} Run this agent</button>
      <button class="btn ghost" data-act="agents">View in agents</button></div>
    <div data-runout style="margin-top:12px"></div></div>`;
}
function wireResult(root,r,template){

function runHtml(rr){
  if(!rr||(rr.ok===false&&!rr.metrics)) return `<div class="note bad">${esc((rr&&rr.message)||'Run failed.')}</div>`;
  let h='';
  if(rr.hitl_pause) h+=`<div class="note warn"><b>⏸ Paused at the human-review gate</b> — ${esc(rr.hitl_pause.agent)}${rr.hitl_pause.pending_tool?` · side-effecting tool <b>${esc(rr.hitl_pause.pending_tool)}</b> held before firing`:` · compliance verdict ${esc((rr.hitl_pause.compliance||{}).verdict||'')}`}.
    <div class="row" style="margin-top:8px"><button class="btn primary sm" data-act="approve">Approve &amp; release</button></div></div>`;
  if(rr.error) h+=`<div class="note bad"><b>${esc(rr.error.type)}</b> in ${esc(rr.error.agent)}: ${esc(rr.error.detail)}</div>`;
  const bb=rr.blackboard||{};
  h+=`<div class="card pad" style="margin-top:10px"><div class="row" style="justify-content:space-between"><h3>Run metrics</h3>
      <a class="small" style="color:var(--acc-ink);cursor:pointer" data-act="trace">trace ${esc(rr.trace_id)} →</a></div>
    <div class="kv" style="margin-top:10px">
      <b>Executed</b><span>${(rr.executed||[]).map(esc).join(' → ')||'—'}</span>
      <b>Latency</b><span>${rr.metrics.latency_ms} ms</span>
      <b>Tokens / cost</b><span>${rr.metrics.tokens} tok · ${money(rr.metrics.cost_usd)}</span>
      <b>Tool calls</b><span>${Object.entries(rr.metrics.tool_calls||{}).map(([k,v])=>k+':'+v).join('  ')||'—'}</span>
      <b>Guardrail trips</b><span>${rr.metrics.guardrail_trips}</span></div></div>`;
  const keys=Object.keys(bb);
  if(keys.length) h+=`<h3 style="margin:16px 0 8px">Results</h3>`+keys.map(k=>{
    const r=bb[k]||{}, outs=r.outputs||{};
    return `<div class="card pad" style="margin-bottom:10px"><div class="row" style="justify-content:space-between"><b>${esc(r.agent||k)}</b><span class="pill">${esc(k)}</span></div>
      ${outs.compose_summary?summaryCard(outs.compose_summary):''}
      ${Object.entries(outs).map(([tn,d])=>`<details style="margin-top:8px"><summary>${esc(tn)}</summary><pre>${esc(JSON.stringify(d,null,2))}</pre></details>`).join('')||'<span class="muted small">—</span>'}</div>`;}).join('');
  return h;
}

async function renderGuardrails(m){
  const agents=await api('/agents');
  m.innerHTML='';
  m.appendChild(el(`<div class="page-head"><div><h1>Guardrails &amp; compliance</h1>
    <div class="sub">Cross-cutting controls wrap every agent — authors write zero guardrail code.</div></div></div>`));
  const cards=[
    ['PII redaction','Inputs and results are scanned for SSNs, cards, emails and phones — hard identifiers are redacted before anything is persisted or returned.','ok'],
    ['Prompt-injection defense','Untrusted tool output (web, MCP, documents) and the free-text field are injection-scanned; matches are quarantined as data, never executed.','bad'],
    ['Least privilege','An agent may call only its compiled allow-list and read/write only its own + declared upstream memory scope. The validator resets anything wider.','navy'],
    ['Human-in-the-loop gate','Side-effecting tools pause for sign-off before firing; flagged output routes through a compliance overseer.','warn'],
    ['Tenant isolation','Specs, memory, logs, runs and MCP servers are scoped per tenant — and an optional bearer token can make the tenant header unspoofable.','ok'],
    ['Immutable audit','Create / run / approve / MCP-registration events are appended to a tamper-evident audit trail.','navy'],
  ];
  const g=el('<div class="gallery"></div>');
  cards.forEach(([t,d,c])=>g.appendChild(el(`<div class="card pad"><div class="row" style="margin-bottom:8px">
    <span class="li-ic" style="background:${({ok:'#0a8f5b',bad:'#c0392b',warn:'#b7791f',navy:'#13386b'})[c]};width:32px;height:32px">${I.shield}</span>

  agents.forEach(s=>{const g=s.guardrails||{};card.querySelector('tbody').appendChild(el(`<tr>
    <td><div class="t-name"><span class="li-ic" style="background:${colorFor(s.name)};width:26px;height:26px;font-size:11px">${initials(s.name)}</span>${esc(s.name)}</div></td>
    <td>${g.injection_check?'<span class="pill ok">on</span>':'<span class="muted">off</span>'}</td>

/* ============================ TRACES ============================ */
async function renderTraces(m){ return tracesInto(m); }
async function tracesInto(m){
  if(STATE.openTrace){const id=STATE.openTrace;STATE.openTrace=null;const tr=await api('/traces/'+id);return traceDetail(m,tr);}
  const list=await api('/traces');
  m.innerHTML='';
  m.appendChild(el(`<div class="page-head"><div><h1>Traces</h1>
    <div class="sub">One trace per run · every agent, tool call and HITL pause is a span.</div></div>
    <div class="actions"><button class="iconbtn" id="rf">${I.refresh}</button></div></div>`));
  m.querySelector('#rf').onclick=()=>render();
  if(!list.length){m.appendChild(el('<div class="card"><div class="empty"><div class="big">No runs yet</div><div class="small">Run an agent to generate a trace.</div></div></div>'));return;}
  const card=el('<div class="card" style="overflow:hidden"><table><thead><tr><th>Trace</th><th>Executed</th><th>Latency</th><th>Tool calls</th><th>Trips</th></tr></thead><tbody></tbody></table></div>');
  list.forEach(x=>{const tr=el(`<tr class="clk"><td><span style="font-family:ui-monospace,monospace;color:var(--acc-ink)">${esc(x.trace_id)}</span></td>
    <td class="small">${(x.executed||[]).map(esc).join(' → ')||'—'}</td><td>${x.metrics.latency_ms}ms</td>
    <td class="small">${Object.entries(x.metrics.tool_calls||{}).map(([k,v])=>k+':'+v).join(' ')||'—'}</td>
    <td>${x.metrics.guardrail_trips}</td></tr>`);
    tr.onclick=()=>{STATE.openTrace=x.trace_id;render();};card.querySelector('tbody').appendChild(tr);});
  m.appendChild(card);
}
function spanEl(s){
  const extra=[s.attrs&&s.attrs.tool_kind?s.attrs.tool_kind:'',s.attrs&&s.attrs.compliance?'compliance:'+s.attrs.compliance.verdict:'',s.attrs&&s.attrs.untrusted?'untrusted':''].filter(Boolean).join(' · ');
  const d=el(`<div class="span"><div><span class="badge ${s.kind}">${s.kind}</span> ${esc(s.name)}
    <span class="muted xs"> ${s.latency_ms}ms${extra?' · '+esc(extra):''}</span></div></div>`);
  (s.children||[]).forEach(c=>d.appendChild(spanEl(c)));
  return d;
}
function traceDetail(m,tr){
  m.innerHTML=`<div class="row" style="margin-bottom:14px"><a class="btn sm ghost" id="back">← Traces</a>
    <h2 style="font-family:ui-monospace,monospace">${esc(tr.trace_id)}</h2></div>
    <div class="card pad"><div class="kv">
      <b>Executed (DAG)</b><span>${(tr.executed||[]).map(esc).join(' → ')||'—'}</span>
      <b>Latency</b><span>${tr.metrics.latency_ms} ms</span>
      <b>Tokens / cost</b><span>${tr.metrics.tokens} · ${money(tr.metrics.cost_usd)}</span>
      <b>Tool calls</b><span>${Object.entries(tr.metrics.tool_calls||{}).map(([k,v])=>k+':'+v).join('  ')||'—'}</span>
      <b>Guardrail trips</b><span>${tr.metrics.guardrail_trips}</span>
      <b>HITL pauses</b><span>${tr.metrics.hitl_pauses}</span></div></div>
    <h3 style="margin:18px 0 8px">Span tree</h3><div class="card pad" id="spans"></div>
    <h3 style="margin:18px 0 8px">Memory (blackboard)</h3><pre>${esc(JSON.stringify(tr.blackboard,null,2))}</pre>
    <h3 style="margin:18px 0 8px">Structured run log</h3><pre>${esc(JSON.stringify(tr.run_logs,null,2))}</pre>`;
  m.querySelector('#back').onclick=()=>{STATE.view='traces';render();};
  if(tr.spans) m.querySelector('#spans').appendChild(spanEl(tr.spans));
}

/* ============================ RUN RECORD (shared) ============================ */
function statusBadge(st){
  const m={success:['ok','Success'],approved:['ok','Approved'],failed:['bad','Failed'],
    blocked:['bad','Blocked'],rejected:['bad','Rejected'],needs_review:['warn','Needs review']};
  const [cls,lab]=m[st]||['flat',st]; return `<span class="pill ${cls}">${esc(lab)}</span>`;
}
function riskChip(level,score){const cls={low:'ok',medium:'warn',high:'bad'}[level]||'flat';
  return `<span class="pill ${cls}">risk: ${esc(level)}${score!=null?' ('+score+')':''}</span>`;}
function stepHtml(s){
  const icon={tool:'🛠',guardrail:'🛡',review:'⏸',output:'✅',error:'⚠',think:'💭'}[s.kind]||'•';
  const head=`<div class="row" style="gap:8px"><span>${icon}</span><b class="small">${esc(s.tool||s.kind)}</b>${s.blocked?'<span class="pill bad">blocked</span>':''}${s.latency_ms?`<span class="muted xs">${s.latency_ms}ms</span>`:''}</div>`;
  const note=s.note?`<div class="muted small" style="margin:2px 0 0 24px">${esc(s.note)}</div>`:'';
  const io=(s.tool_input||s.tool_output)?`<details style="margin:5px 0 0 24px"><summary class="xs">tool input / output</summary><pre>${esc(JSON.stringify({input:s.tool_input,output:s.tool_output},null,2))}</pre></details>`:'';
  return `<div style="border-left:2px solid var(--line);padding:6px 0 6px 12px;margin:5px 0">${head}${note}${io}</div>`;
}
function runRecordHtml(rec,opts={}){
  if(!rec||(rec.ok===false)) return `<div class="note bad">${esc((rec&&rec.message)||'No run.')}</div>`;
  const out=rec.output;
  let h=`<div class="card pad">
    <div class="row" style="justify-content:space-between">
      <div class="t-name"><span class="li-ic" style="background:${colorFor(rec.agent)};width:28px;height:28px">${initials(rec.agent)}</span>${esc(rec.agent)}</div>
      <div class="row">${statusBadge(rec.status)} ${riskChip(rec.risk_level,rec.risk_score)} <span class="pill ${rec.mode==='llm'?'t2':'flat'}">${rec.mode==='llm'?'LLM runtime':'demo engine'}</span></div></div>
    <div class="kv" style="margin-top:10px;grid-template-columns:110px 1fr">
      <b>Input</b><span><pre style="max-height:120px">${esc(JSON.stringify(rec.input,null,2))}</pre></span>
      <b>Duration</b><span class="small">${rec.duration_ms} ms · ${(rec.steps||[]).length} steps</span>
      ${(rec.risk_flags||[]).length?`<b>Risk flags</b><span>${rec.risk_flags.map(f=>`<span class="tool-chip">${esc(f)}</span>`).join('')}</span>`:''}
      <b>Trace</b><span><a class="link small" data-trace="${esc(rec.trace_id)}" style="cursor:pointer;color:var(--acc-ink)">${esc(rec.trace_id)} →</a></span></div>`;
  if(rec.status==='needs_review'&&rec.pending_action)
    h+=`<div class="note warn" style="margin-top:10px"><b>⏸ Awaiting human approval</b> — side-effecting tool <b>${esc(rec.pending_action.tool)}</b> is held before firing.</div>`;
  h+=`<div style="margin-top:12px"><b class="small">Execution trace</b>${(rec.steps||[]).map(stepHtml).join('')||'<div class="muted small">no steps</div>'}</div>`;
  h+=`<div style="margin-top:12px"><b class="small">Output</b>${out&&out.recommended_next_action?summaryCard(out):`<pre>${esc(JSON.stringify(out,null,2))}</pre>`}</div>`;
  if(opts.review&&rec.status==='needs_review')
    h+=`<div class="row" style="margin-top:14px;gap:10px"><input id="rvnote" placeholder="Reviewer note (optional)" style="flex:1">
      <button class="btn primary sm" data-review="approve" data-run="${esc(rec.id)}">Approve</button>
      <button class="btn sm" data-review="reject" data-run="${esc(rec.id)}" style="color:var(--bad)">Reject</button></div>`;
  return h+`</div>`;
}
function wireRunRecord(root){
  root.querySelectorAll('[data-trace]').forEach(a=>a.onclick=()=>{STATE.openTrace=a.dataset.trace;STATE.view='traces';render();});
  root.querySelectorAll('[data-review]').forEach(b=>b.onclick=async()=>{
    const note=(root.querySelector('#rvnote')||{}).value||''; b.disabled=true;
    try{await api('/reviews/'+encodeURIComponent(b.dataset.run),{method:'POST',body:JSON.stringify({decision:b.dataset.review,note})});render();}
    catch(e){alert(e.message||e);b.disabled=false;}});
}

async function renderPlayground(m){

  const sel=STATE.pgAgent&&agents.some(a=>a.name===STATE.pgAgent)?STATE.pgAgent:agents[0].name;
  const card=el(`<div class="card pad">
    <label class="fld">Agent</label>
    <select id="pgAgent">${agents.map(a=>`<option value="${esc(a.name)}" ${a.name===sel?'selected':''}>${esc(a.name)} · tier ${a.tier}${a.requires_human_review?' · HITL':''}</option>`).join('')}</select>
    <label class="fld">Task input (JSON)</label>
    <textarea id="pgInput" rows="5">{ "company": "Stripe", "name": "Jane Doe" }</textarea>
    <label class="fld" style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="pgSide" style="width:auto"> Pre-approve side-effecting tools for this run</label>
    <button class="btn primary" id="pgRun" style="margin-top:14px">${I.play} Run agent</button>
    <div id="pgOut" style="margin-top:16px"></div></div>`);
  m.appendChild(card);
  card.querySelector('#pgAgent').onchange=e=>{STATE.pgAgent=e.target.value;};
  card.querySelector('#pgRun').onclick=async()=>{
    const out=card.querySelector('#pgOut'); out.innerHTML='<div class="note info">Running the governed runtime…</div>';
    let inputs={};
    try{inputs=JSON.parse(card.querySelector('#pgInput').value||'{}');}catch(_){out.innerHTML='<div class="note bad">Input must be valid JSON.</div>';return;}
    try{const rec=await api('/agents/'+encodeURIComponent(card.querySelector('#pgAgent').value)+'/invoke',
        {method:'POST',body:JSON.stringify({inputs,approve_side_effecting:card.querySelector('#pgSide').checked})});
      out.innerHTML=runRecordHtml(rec,{review:true}); wireRunRecord(out);
    }catch(e){out.innerHTML=`<div class="note bad">${esc(e.message||e)}</div>`;}
  };
}

/* ============================ COMPILER LOG ============================ */
async function renderCompiler(m){
  const logs=await api('/compiler-logs');
  m.innerHTML='';
  m.appendChild(el(`<div class="page-head"><div><h1>Compiler log</h1>
    <div class="sub">What the LLM proposed and what the validator disposed — the security audit of every compile.</div></div>
    <div class="actions"><button class="iconbtn" id="rf">${I.refresh}</button></div></div>`));
  m.querySelector('#rf').onclick=()=>render();
  if(!logs.length){m.appendChild(el('<div class="card"><div class="empty"><div class="big">No compilations yet</div><div class="small">Create an agent to see the proposer/disposer trail.</div></div></div>'));return;}
  logs.slice().reverse().forEach(l=>{
    const strips=(l.verdicts||[]).flatMap(v=>v.stripped||[]);
    const warns=(l.verdicts||[]).flatMap(v=>v.warnings||[]);
    const inj=l.freetext_injection_signatures||[];
    m.appendChild(el(`<div class="card pad" style="margin-bottom:12px">
      <div class="row" style="justify-content:space-between"><div class="t-name"><span class="li-ic" style="background:${colorFor(l.agent)};width:26px;height:26px;font-size:11px">${initials(l.agent)}</span>${esc(l.agent)}</div>
        <div class="row"><span class="pill ${l.used_llm?'t2':'flat'}">${l.used_llm?'Groq/Llama':'deterministic'}</span>
          <span class="pill">attempts: ${l.attempts}</span><span class="pill ${l.ok?'ok':'bad'}">${l.ok?'validated':'rejected'}</span></div></div>
      ${strips.length?`<div class="note warn" style="margin-top:10px"><b>Stripped / neutralized:</b><br>${strips.map(x=>'• '+esc(x)).join('<br>')}</div>`:''}
      ${inj.length?`<div class="note bad" style="margin-top:8px"><b>Free-text injection detected:</b> ${inj.map(esc).join(', ')}</div>`:''}
      ${warns.length?`<div class="small muted" style="margin-top:8px">${warns.map(esc).join(' · ')}</div>`:''}
      <details style="margin-top:10px"><summary>Candidate the LLM proposed</summary><pre>${esc(JSON.stringify(l.candidate_specs,null,2))}</pre></details></div>`));
  });
}

function showLogin(){
  closeDrawer();
  document.getElementById('main').innerHTML=`
    <div style="max-width:380px;margin:8vh auto">
      <div class="card pad">
        <div style="text-align:center;margin-bottom:16px">

    try{
      const r=await api('/login',{method:'POST',body:JSON.stringify({
        username:document.getElementById('lu').value,password:document.getElementById('lp').value})});

document.getElementById('avatar').onclick=async()=>{
  if(!authToken())return;
  if(confirm('Sign out of Fingent?')){try{await api('/logout',{method:'POST'});}catch(_){}try{sessionStorage.removeItem('fin_token');}catch(_){}showLogin();}
};
async function boot(){
  document.getElementById('avatar').textContent=tenant()[0].toUpperCase();
  let cfg={auth_required:false};
  try{cfg=await api('/config');}catch(_){}
  if(cfg.auth_required){
    if(!authToken()) return showLogin();
    try{const me=await api('/me');setTenant(me.tenant);}
    catch(_){try{sessionStorage.removeItem('fin_token');}catch(__){}return showLogin();}
  }
  render();
}
